[pytest]
# The engine is the `machi_koro_engine` package; tests import it as
# `from machi_koro_engine... import ...`. `pythonpath = .` (rootdir =
# websocket-server) puts the package on the path; tests live with the package.
pythonpath = .
testpaths = machi_koro_engine/tests
addopts = -v --tb=short
