# Alembic config for the Postgres game-data layer (Stage 2, S2.2).
# The DB URL is NOT set here — env.py reads it from the environment (DB_* / DATABASE_URL)
# via persistence.database, so dev/CI/prod all use the same env-driven config.
[alembic]
# %(here)s = the directory containing this file, so alembic works from any cwd
# (e.g. `alembic -c persistence/alembic.ini upgrade head`).
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
