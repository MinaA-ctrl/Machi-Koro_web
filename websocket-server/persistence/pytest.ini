[pytest]
# Backend persistence suite (S2.2). Separate from the engine suite — these need a
# live Postgres + the backend deps (requirements-backend.txt), so they run in their
# own `backend-tests` CI job, not engine-tests.
# Run from this dir: `cd websocket-server/persistence && python -m pytest`.
# pythonpath = .. puts `websocket-server` on the path so `import persistence.*` works.
pythonpath = ..
testpaths = tests
asyncio_mode = auto
addopts = -v --tb=short
