[pytest]
# App/API suite (S2.3). Driven with FastAPI's TestClient (sync) against a live
# Postgres that already has the Alembic migrations applied — runs in the
# `backend-tests` CI job. pythonpath = .. puts `websocket-server` on the path so
# `app`, `persistence`, and `machi_koro_engine` all import.
# Run from this dir: `cd websocket-server/app && python -m pytest`.
pythonpath = ..
testpaths = tests
addopts = -v --tb=short
