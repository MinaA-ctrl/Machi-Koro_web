events {}

http {
    server {
        listen 80;

        # All regular traffic goes to WordPress
        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket traffic routed to the live Python server (main.py / MySQL)
        location /ws/ {
            proxy_pass http://websocket:8001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Stage 2 (S2.6a): the NEW FastAPI + Postgres backend (app.main) ──────
        # Runs alongside the live stack above for parity testing — live traffic is
        # NOT flipped here (that's S2.7). Path scheme (the S2.6b contract for the JS):
        #   /api/ws/<code>/{game,lobby}/<seat>  → backend WebSocket  (→ upstream /ws/...)
        #   /api/<rest>                          → backend REST       (→ upstream /<rest>)
        # The trailing slash on proxy_pass strips the /api prefix; /api/ws/ is the
        # more specific match, so it wins for sockets.

        location /api/ws/ {
            proxy_pass http://backend:8001/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        location /api/ {
            proxy_pass http://backend:8001/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
