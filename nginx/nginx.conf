events {}

http {
    server {
        listen 80;

        # Page traffic → WordPress (page-host only, since S2.7).
        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── The FastAPI + Postgres backend (app.main) — the live game backend ───
        # Path scheme:
        #   /api/ws/<code>/{game,lobby}/<seat>  → backend WebSocket  (→ upstream /ws/...)
        #   /api/<rest>                          → backend REST       (→ upstream /<rest>)
        # The trailing slash on proxy_pass strips the /api prefix; /api/ws/ is the
        # more specific match, so it wins for sockets.

        location /api/ws/ {
            proxy_pass http://backend:8001/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        location /api/ {
            proxy_pass http://backend:8001/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
