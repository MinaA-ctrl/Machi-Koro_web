name: php-ci

# Lints the WordPress plugin's PHP on every change. Since Stage 2 S2.7 the plugin
# is page-host only (shortcodes + asset enqueue) — the old REST surface (api.php)
# and MySQL schema bootstrap (db.php / mk_install / mk_migrate) were retired, so
# the schema-migration job is gone. The game's data layer is now Alembic on
# Postgres (see backend-tests / persistence/migrations).

on:
  push:
    paths:
      - "wp-plugin/**"
      - ".github/workflows/php-ci.yml"
  pull_request:
    paths:
      - "wp-plugin/**"
      - ".github/workflows/php-ci.yml"

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: php -l across all plugin PHP files
        # -n1 so the failing file is named; xargs exits non-zero if any -l fails.
        run: find wp-plugin -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
