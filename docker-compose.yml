services:

  db:
    image: mysql:8.0
    container_name: machikoro_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - machikoro_net

  # Stage 2 (S2.2): Postgres for the new FastAPI backend's persistence layer.
  # DEV/parallel only — DORMANT: no service connects to it yet (the live MVP runs
  # on `db` above). Wired in at the S2.6/S2.7 cutover. Port 5433 on the host to
  # avoid clashing with a local Postgres.
  postgres:
    image: postgres:16
    container_name: machikoro_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-machikoro}
      POSTGRES_USER: ${POSTGRES_USER:-machikoro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-machikoro}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - machikoro_net

  wordpress:
    image: wordpress:latest
    container_name: machikoro_wordpress
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      # Shared HMAC secret for signing game WebSocket tokens (must match websocket service)
      MK_WS_SECRET: ${MK_WS_SECRET}
    volumes:
      - wp_data:/var/www/html
      - ./wp-plugin/machi-koro:/var/www/html/wp-content/plugins/machi-koro
    networks:
      - machikoro_net

  websocket:
    build: ./websocket-server
    container_name: machikoro_ws
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Must be identical to the wordpress service's MK_WS_SECRET
      MK_WS_SECRET: ${MK_WS_SECRET}
    depends_on:
      - db
    networks:
      - machikoro_net

  nginx:
    image: nginx:alpine
    container_name: machikoro_nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wordpress
      - websocket
    networks:
      - machikoro_net

volumes:
  db_data:
  wp_data:
  pg_data:   # Stage 2 (S2.2) Postgres — dormant until cutover

networks:
  machikoro_net:
