services:

  db:
    image: mysql:8.0
    container_name: machikoro_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - machikoro_net

  wordpress:
    image: wordpress:latest
    container_name: machikoro_wordpress
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wp_data:/var/www/html
      - ./wp-plugin/machi-koro:/var/www/html/wp-content/plugins/machi-koro
    networks:
      - machikoro_net

  websocket:
    build: ./websocket-server
    container_name: machikoro_ws
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - db
    networks:
      - machikoro_net

  nginx:
    image: nginx:alpine
    container_name: machikoro_nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wordpress
      - websocket
    networks:
      - machikoro_net

volumes:
  db_data:
  wp_data:

networks:
  machikoro_net:
