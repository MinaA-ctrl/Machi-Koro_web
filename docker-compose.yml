services:

  db:
    image: mysql:8.0
    container_name: machikoro_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - machikoro_net

  # Stage 2 (S2.2): Postgres for the new FastAPI backend's persistence layer.
  # S2.6a: now backs the `backend` service (run alongside the live MVP for parity
  # testing; live traffic flips in S2.7). Port 5433 on the host to avoid clashing
  # with a local Postgres.
  postgres:
    image: postgres:16
    container_name: machikoro_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-machikoro}
      POSTGRES_USER: ${POSTGRES_USER:-machikoro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-machikoro}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - machikoro_net

  wordpress:
    image: wordpress:latest
    container_name: machikoro_wordpress
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      # Shared HMAC secret for signing game WebSocket tokens (must match websocket service)
      MK_WS_SECRET: ${MK_WS_SECRET}
    volumes:
      - wp_data:/var/www/html
      - ./wp-plugin/machi-koro:/var/www/html/wp-content/plugins/machi-koro
    networks:
      - machikoro_net

  websocket:
    build: ./websocket-server
    container_name: machikoro_ws
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Must be identical to the wordpress service's MK_WS_SECRET
      MK_WS_SECRET: ${MK_WS_SECRET}
    depends_on:
      - db
    networks:
      - machikoro_net

  # Stage 2 (S2.6a): the new FastAPI + Postgres backend (app.main), run ALONGSIDE
  # the live websocket/wordpress for parity testing. Reachable through nginx under
  # /api/* (REST) and /api/ws/* (WebSocket). Migrations apply on startup. Live
  # traffic does NOT flip here — that's S2.7.
  backend:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile.backend
    container_name: machikoro_backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-machikoro}
      DB_USER: ${POSTGRES_USER:-machikoro}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-machikoro}
      MK_ENV: prod                       # enforces real secrets + rate limiting
      MK_JWT_SECRET: ${MK_JWT_SECRET}     # required (boot fails if unset/insecure)
      MK_WS_SECRET: ${MK_WS_SECRET}       # required; same value the WS token uses
    depends_on:
      - postgres
    networks:
      - machikoro_net

  nginx:
    image: nginx:alpine
    container_name: machikoro_nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wordpress
      - websocket
      - backend
    networks:
      - machikoro_net

volumes:
  db_data:
  wp_data:
  pg_data:   # Stage 2 (S2.2) Postgres — dormant until cutover

networks:
  machikoro_net:
