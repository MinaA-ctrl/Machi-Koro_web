services:

  db:
    image: mysql:8.0
    container_name: machikoro_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - machikoro_net

  # Postgres for the FastAPI backend's persistence layer (game data, accounts,
  # entitlements). Host port 5433 to avoid clashing with a local Postgres.
  postgres:
    image: postgres:16
    container_name: machikoro_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-machikoro}
      POSTGRES_USER: ${POSTGRES_USER:-machikoro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-machikoro}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - machikoro_net

  wordpress:
    image: wordpress:latest
    container_name: machikoro_wordpress
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wp_data:/var/www/html
      - ./wp-plugin/machi-koro:/var/www/html/wp-content/plugins/machi-koro
    networks:
      - machikoro_net

  # The Stage-2 FastAPI + Postgres backend (app.main) — the live game backend.
  # Serves REST + WebSocket through nginx under /api/* and /api/ws/*. Applies
  # Alembic migrations on startup; MK_ENV=prod enforces real secrets.
  backend:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile.backend
    container_name: machikoro_backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-machikoro}
      DB_USER: ${POSTGRES_USER:-machikoro}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-machikoro}
      MK_ENV: prod                       # enforces real secrets + rate limiting
      MK_JWT_SECRET: ${MK_JWT_SECRET}     # required (boot fails if unset/insecure)
      MK_WS_SECRET: ${MK_WS_SECRET}       # required; same value the WS token uses
    depends_on:
      - postgres
    networks:
      - machikoro_net

  nginx:
    image: nginx:alpine
    container_name: machikoro_nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wordpress
      - backend
    networks:
      - machikoro_net

volumes:
  db_data:   # MySQL — WordPress core (pages/posts) only
  wp_data:
  pg_data:   # Postgres — the game backend's data

networks:
  machikoro_net:
